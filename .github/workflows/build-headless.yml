name: Build Linux Headless Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-headless:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Install System Dependencies for Webkit
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Headless Server
        working-directory: src-tauri
        run: cargo build --bin zerror_headless --release

      - name: Package Release
        run: |
          mkdir -p release-package/dist
          cp -r dist/* release-package/dist/
          cp src-tauri/target/release/zerror_headless release-package/
          cd release-package
          tar -czvf ../zerror-linux-headless.tar.gz .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: zerror-linux-headless.tar.gz
